<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TE Style Labels Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>Hand-Curated Domain-&-Style-Diverse TE-Style Microdataset</h1>
      </header>

      <section id="status" class="status">Loading labels...</section>

      <section class="table-wrapper" aria-live="polite">
        <table id="labels-table" class="labels-table" hidden>
          <thead>
            <tr>
              <th>Actor Label</th>
              <th>Task Label</th>
              <th>TE Style Label</th>
              <th>Video</th>
            </tr>
          </thead>
          <tbody id="labels-table-body"></tbody>
        </table>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
